<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator Login - Cinematic Split</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Raleway', sans-serif;
            background-color: #f7f7f7; /* Light neutral background */
        }

        /* Styling for the Image Side (Placeholder) */
        .image-side {
            /* Replace 'your-campus-image.jpg' with a real image URL */
            background-image: url('https://images.unsplash.com/photo-1541339907198-e0875663f974?fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            /* Dark overlay for text readability */
            position: relative;
        }
        .image-side::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4); /* Dark Overlay */
        }

        /* Premium Button Style */
        .login-button {
            transition: all 0.3s ease;
        }
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.4); /* Shadow matching primary color */
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#3498db', /* Modern, striking blue */
                        'primary-dark': '#2c3e50', /* Dark Text/Accent */
                    },
                }
            }
        }
    </script>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="flex w-full max-w-5xl h-[600px] bg-white rounded-3xl shadow-2xl overflow-hidden">

        <div class="image-side w-1/2 p-10 hidden lg:flex items-end text-white">
            <div class="relative z-10">
                <h2 class="text-5xl font-extrabold leading-tight">
                    Welcome to<br>
                    <span class="text-primary-blue drop-shadow-lg">Campus Navigator</span>
                </h2>
                <p class="mt-4 text-xl font-light">
                    The centralized control panel for your institution's mapping system.
                </p>
                <div class="mt-8">
                     <span class="inline-block px-4 py-1 text-sm bg-primary-blue rounded-full font-semibold"></span>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-1/2 p-12 flex flex-col justify-center">

            <div class="mb-10">
                <h3 class="text-3xl font-bold text-primary-dark">Campus Role Sign In</h3>
                <p class="text-gray-500 mt-2">Access the system securely with your credentials.</p>
            </div>

            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-400 text-red-700 p-4 rounded-md mb-6" role="alert">
                <p class="font-semibold text-sm">{{ error }}</p>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">

                <div class="mb-6">
                    <label for="username" class="block mb-2 text-sm font-semibold text-gray-700">Username</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                          <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                        <input type="text" id="username" name="username" required
                               class="w-full pl-10 pr-4 py-3 border-b-2 border-gray-200 focus:border-primary-blue
                                      rounded-lg transition duration-200 text-primary-dark focus:outline-none"
                               placeholder="Enter your username or ID">
                    </div>
                </div>

                <div class="mb-8">
                    <label for="password" class="block mb-2 text-sm font-semibold text-gray-700">Password</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                          <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                        </svg>
                        <input type="password" id="password" name="password" required
                               class="w-full pl-10 pr-4 py-3 border-b-2 border-gray-200 focus:border-primary-blue
                                      rounded-lg transition duration-200 text-primary-dark focus:outline-none"
                               placeholder="Enter your secret password">
                    </div>
                    <div class="text-right mt-2">
                        <a href="#" class="text-xs text-primary-blue hover:text-blue-700 transition duration-150">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit"
                        class="login-button w-full px-4 py-3 text-lg font-bold text-white
                               bg-primary-blue rounded-xl uppercase tracking-wider
                               focus:outline-none focus:ring-4 focus:ring-primary-blue focus:ring-opacity-50">
                    Secure Login
                </button>
            </form>

            <div class="mt-12 text-center text-xs text-gray-400">
                <p>&copy; 2023 Campus Navigation System. All Rights Reserved.</p>
            </div>
        </div>

    </div>

</body>
</html>
